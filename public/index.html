<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#8203;</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='white'>%3E_</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="logo">&gt;_</span>
        <span id="usage-badge" class="usage-badge" title="30-day token usage"></span>
        <button id="add-project-btn" title="Add project">+</button>
        <button id="refresh-btn" title="Refresh projects" onclick="window.__herd?.loadProjects()">&#x21bb;</button>
      </div>
      <div id="search-bar">
        <input type="text" id="project-search" placeholder="Filter projects..." spellcheck="false">
      </div>
      <div id="project-list"></div>
      <div id="sidebar-footer">
        <button class="theme-btn" data-theme="light" title="Light theme">light</button>
        <button class="theme-btn" data-theme="dark" title="Dark theme">dark</button>
        <button class="theme-btn" data-theme="auto" title="System theme">auto</button>
      </div>
    </aside>
    <div id="resize-handle"></div>
    <main id="main">
      <div id="tab-bar">
        <div id="tabs"></div>
        <button id="new-tab-btn" title="New session in active project (Ctrl+T)">+</button>
      </div>
      <div id="terminal-area"></div>
      <div id="empty-state">
        <div class="empty-content">
          <pre class="ascii-logo">
  ┌─────────────────┐
  │  &gt;_             │
  └─────────────────┘</pre>
          <p>Select a project to start</p>
          <p class="hint">or resume an existing session</p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-webgl@0.16.0/lib/xterm-addon-webgl.js"></script>
  <script src="/app.js"></script>
</body>
</html>
